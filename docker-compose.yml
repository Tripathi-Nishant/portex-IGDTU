version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: safevoice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./server
    environment:
      DATABASE_URL: "postgresql://postgres:postgrespassword@postgres:5432/safevoice?schema=public"
      JWT_SECRET: "supersecret_safevoice_jwt_key_2026"
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres

  frontend:
    build: ./client
    ports:
      - "8080:80"

volumes:
  postgres_data:
